name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install pytest pytest-timeout mypy ruff fastapi uvicorn httpx
      - name: Run test suite
        run: python -m pytest tests/ -q
      - name: Type-check hive package
        run: mypy
      - name: Lint
        run: ruff check .
      - name: Shell syntax check
        run: bash -n comms.sh agent-runner.sh
